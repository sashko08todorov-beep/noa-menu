<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

<body>
    <h1>N O A</h1>

    <div class="menu-item">
        <img src="tomahawk.png">

        <div class="price">15,33 €</div>
    </div>

    <div class="menu-item">
        <img src="burrata.png">
        <h3>Бурата с розов домат</h3>
        <div class="price">11,03 €</div>
    </div>

    <a href="tel:0895707707" class="order-btn">РЕЗЕРВИРАЙ МАСА</a>
